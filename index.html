<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login Code Desk</title>
</head>
<body>
    <!-- MODAL DE ENTRAR -->
    <div class="overlay-modal visivel" id="modal-entrar" >
        <div class="caixa-modal">
            <div class="titulo-modal">
                Entrar  
            </div>
            <p class="descricao-modal">
                Acesse sua conta de professor para salvar correções.
            </p>

            <form id="formulario-entrar">
                <div class="grupo-formulario">
                    <label class="rotulo-campo">E-mail</label>
                    <input type="email" class="campo-entrada" id="email-entrar" placeholder="professor@universidade.edu"
                        required>
                </div>

                <div class="grupo-formulario">
                    <label class="rotulo-campo">Senha</label>
                    <input type="password" class="campo-entrada" id="senha-entrar" placeholder="Sua senha" required>
                </div>

                <button type="submit" class="botao">Entrar</button>
            </form>

            <div style="margin-top: 1rem; text-align: center; color: var(--cor-texto-secundario); font-size: 0.9rem;">
                Não tem conta? <a class="link-autenticacao" id="link-cadastro">Criar conta</a>
            </div>
        </div>
    </div>

     <!-- MODAL DE CADASTRAR -->
    <div class="overlay-modal" id="modal-cadastrar">
        <div class="caixa-modal">
            <div class="titulo-modal">
                Criar conta
            </div>
            <p class="descricao-modal">
                Cadastre-se para gerenciar e corrigir provas.
            </p>

            <form id="formulario-cadastrar">
                <div class="grupo-formulario">
                    <label class="rotulo-campo">Nome completo</label>
                    <input type="text" class="campo-entrada" id="nome-cadastro" placeholder="Maria Souza" required>
                </div>

                <div class="grupo-formulario">
                    <label class="rotulo-campo">E-mail</label>
                    <input type="email" class="campo-entrada" id="email-cadastro"
                        placeholder="professor@universidade.edu" required>
                </div>

                <div class="grupo-formulario">
                    <label class="rotulo-campo">Senha</label>
                    <input type="password" class="campo-entrada" id="senha-cadastro" placeholder="Mínimo 8 caracteres"
                        required>
                </div>

                <button type="submit" class="botao">Criar conta</button>
            </form>

            <div style="margin-top: 1rem; text-align: center; color: var(--cor-texto-secundario); font-size: 0.9rem;">
                Já tem conta? <a class="link-autenticacao" id="link-entrar">Entrar</a>
            </div>
        </div>
    </div>
    

<script src="scripts-login.js"></script>

</body>
</html>
